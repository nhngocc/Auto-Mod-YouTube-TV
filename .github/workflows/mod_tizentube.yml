name: Auto Mod TizenTube Cobalt

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm
            source: cobalt-arm.apk
            output: YouTube-TV-arm.apk

          - abi: arm64
            source: cobalt-arm64.apk
            output: YouTube-TV-arm64.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Source APK
        run: |
          wget -L -O source.apk \
          https://github.com/reisxd/TizenTubeCobalt/releases/latest/download/${{ matrix.source }}

      - name: Download Apktool
        run: |
          wget -L -O apktool.jar \
          https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar

      - name: Decode APK
        run: |
          java -jar apktool.jar d source.apk -o decompiled_app

      - name: Modify Package & Name
        run: |
          sed -i 's/package="[^"]*"/package="com.google.android.youtube.tv"/g' decompiled_app/AndroidManifest.xml

          sed -i 's/android:label="[^"]*"/android:label="YouTube"/g' decompiled_app/AndroidManifest.xml

          find decompiled_app -type f -name "*.xml" \
            -exec sed -i 's/TizenTube/YouTube/g' {} \; || true

          grep -RIl "TizenTube" decompiled_app | while read f; do
            sed -i 's/TizenTube/YouTube/g' "$f" || true
          done

      - name: Replace Icons & Banner
        run: |
          find decompiled_app/res -type f -iname "*launcher*" ! -name "*.xml" \
            -exec cp -f mod-assets/icon.png {} \;

          find decompiled_app/res -type f -iname "*ic_app*" ! -name "*.xml" \
            -exec cp -f mod-assets/icon.png {} \;

          find decompiled_app/res -type f -iname "*banner*" ! -name "*.xml" \
            -exec cp -f mod-assets/banner.png {} \;

      - name: Rebuild
        run: |
          java -jar apktool.jar b decompiled_app -o unsigned.apk --force-all

      - name: Zipalign & Sign
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks

          ZIPALIGN=$(find $ANDROID_HOME -name zipalign | head -n 1)
          APKSIGNER=$(find $ANDROID_HOME -name apksigner | head -n 1)

          $ZIPALIGN -p -f -v 4 unsigned.apk aligned.apk

          $APKSIGNER sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:${{ secrets.KEY_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out "${{ matrix.output }}" \
            aligned.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: YouTube TV Mod v${{ github.run_number }}
          files: |
            **/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
