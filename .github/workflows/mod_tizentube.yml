name: Auto Mod TizenTubeCobalt (TV Box 32-bit)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Lấy nguyên liệu từ Repo của m
        uses: actions/checkout@v4

      - name: 2. Cài đặt môi trường Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Tải TizenTubeCobalt (Bản cobalt-arm.apk 32-bit mới nhất)
        run: |
          echo "Đang tải bản cobalt-arm.apk mới nhất từ Repo tác giả..."
          wget -L -O cobalt-arm.apk "https://github.com/reisxd/TizenTubeCobalt/releases/latest/download/cobalt-arm.apk"

      - name: 4. Tải công cụ APKTool chính chủ từ GitHub
        run: |
          echo "Đang tải APKTool v2.10.0 siêu tốc từ GitHub Releases..."
          wget -L -O apktool.jar "https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar"

      - name: 5. Bung tài nguyên APK (Bỏ qua giải mã code cho siêu nhanh)
        run: |
          java -jar apktool.jar d -s cobalt-arm.apk -o decompiled_app

      - name: 6. Đổi Tên App và Package Name toàn diện (Mọi ngôn ngữ)
        run: |
          echo "1. Đổi Package Name thành YouTube TV chính chủ để nhận nút Remote & Giọng nói..."
          sed -i 's/package="[^"]*"/package="com.google.android.youtube.tv"/g' decompiled_app/AndroidManifest.xml
          
          echo "2. Càn quét đổi tên hiển thị trong TẤT CẢ các thư mục ngôn ngữ (res/values*)..."
          find decompiled_app/res/ -type f -name "*.xml" -exec sed -i 's/TizenTube Cobalt/YouTube Pro/gi' {} \;
          find decompiled_app/res/ -type f -name "*.xml" -exec sed -i 's/TizenTube/YouTube Pro/gi' {} \;
          find decompiled_app/res/ -type f -name "*.xml" -exec sed -i 's/>Cobalt</>YouTube Pro</g' {} \;
          
          echo "3. Đổi tên cứng trực tiếp nếu bị hardcode trong AndroidManifest..."
          sed -i 's/android:label="[^"]*"/android:label="YouTube Pro"/g' decompiled_app/AndroidManifest.xml

      - name: 7. Thay thế Icon và Banner TV mới nét căng (Bất chấp đuôi file)
        run: |
          echo "1. Xóa các file XML Icon thích ứng (Adaptive Icon)..."
          find decompiled_app/res/ -type f -name "*launcher*.xml" -delete 2>/dev/null || true
          find decompiled_app/res/ -type f -name "*icon*.xml" -delete 2>/dev/null || true
          
          echo "2. Lùng sục và đè Icon mới vào TẤT CẢ các file icon (BẤT CHẤP ĐUÔI FILE)..."
          find decompiled_app/res/ -type f -iname "*launcher*" ! -name "*.xml" -exec cp -f mod-assets/icon.png {} \;
          find decompiled_app/res/ -type f -iname "*ic_app*" ! -name "*.xml" -exec cp -f mod-assets/icon.png {} \;
          find decompiled_app/res/ -type f -iname "*ic_icon*" ! -name "*.xml" -exec cp -f mod-assets/icon.png {} \;
          find decompiled_app/res/ -type f -iname "*logo*" ! -name "*.xml" -exec cp -f mod-assets/icon.png {} \;
          
          echo "3. Lùng sục và đè Banner TV mới (BẤT CHẤP ĐUÔI FILE)..."
          find decompiled_app/res/ -type f -iname "*banner*" ! -name "*.xml" -exec cp -f mod-assets/banner.png {} \;
          find decompiled_app/res/ -type f -iname "*tv_banner*" ! -name "*.xml" -exec cp -f mod-assets/banner.png {} \;
          
          echo "4. Check thử ngày giờ sửa đổi của file ic_app để kiểm chứng..."
          find decompiled_app/res/ -type f -iname "*ic_app*" -exec ls -la {} \;

      - name: 8. Đóng gói lại thành APK mới
        run: |
          java -jar apktool.jar b decompiled_app -o unsigned.apk

      - name: 9. Canh lề và Ký chữ ký số chính chủ Google
        run: |
          echo "Đang giải mã Keystore..."
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > mykeystore.jks
          
          echo "Đang canh lề chuẩn 4-byte (Zipalign)..."
          $ANDROID_HOME/build-tools/34.0.0/zipalign -p -f -v 4 unsigned.apk aligned.apk
          
          echo "Đang ký mã bảo mật APK..."
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks mykeystore.jks --ks-key-alias "${{ secrets.ALIAS }}" --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" --key-pass "pass:${{ secrets.KEY_PASSWORD }}" --out YouTube-Pro-TV-mod.apk aligned.apk
          
          echo "Dọn dẹp file rác bảo mật..."
          rm -f mykeystore.jks unsigned.apk aligned.apk

      - name: 10. Xuất xưởng file APK đã Mod lên mục Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}-mod"
          name: "YouTube Pro TV (Modded TizenTube)"
          files: YouTube-Pro-TV-mod.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
